name: Backup Automático del Directorio

on:
  schedule:
    - cron: '0 6 * * *'  # Todos los días a las 2:00 AM hora de Puerto Rico
  workflow_dispatch:      # Permite ejecutarlo manualmente desde GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Obtener datos y crear backup CSV
        run: |
          node -e "
          const https = require('https');
          const fs = require('fs');

          https.get('https://directorio-municipal.vercel.app/api/get-data', (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              const employees = JSON.parse(data);
              if (!employees.length) {
                console.log('No hay datos para respaldar.');
                process.exit(1);
              }

              const headers = 'Nombre,Apellido,Email,Teléfono,Departamento,Puesto,Extensión';
              const rows = employees.map(e => [
                '\"' + (e.firstName  || '') + '\"',
                '\"' + (e.lastName   || '') + '\"',
                '\"' + (e.email      || '') + '\"',
                '\"' + (e.phone      || '') + '\"',
                '\"' + (e.department || '') + '\"',
                '\"' + (e.position   || '') + '\"',
                '\"' + (e.extension  || '') + '\"'
              ].join(','));

              const csv = [headers, ...rows].join('\n');
              if (!fs.existsSync('backups')) fs.mkdirSync('backups');

              const date = new Date().toISOString().split('T')[0];
              const filename = 'backups/backup-' + date + '.csv';
              fs.writeFileSync(filename, csv, 'utf8');
              console.log('Backup creado: ' + filename + ' (' + employees.length + ' empleados)');
            });
          }).on('error', (err) => {
            console.error('Error al obtener datos:', err.message);
            process.exit(1);
          });
          "

      - name: Eliminar backups antiguos (conservar últimos 30)
        run: |
          ls -t backups/backup-*.csv 2>/dev/null | tail -n +31 | xargs -r rm -f

      - name: Guardar backup en el repositorio
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "Backup automático $(date +'%Y-%m-%d')"
          git push
